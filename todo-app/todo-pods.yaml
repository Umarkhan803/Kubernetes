apiVersion: v1
kind: Pod
metadata:
  name: todo-pod
  labels:
    app: todo-app
spec:
  containers:
    - name: todo-frontned
      image: umarkhan803/todo-frontend
      ports:
      - containerPort: 3000
    - name: todo-backend
      image: umarkhan803/todo-backend
      ports:
      - containerPort: 3000
        name: todo-app